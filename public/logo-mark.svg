<svg xmlns="http://www.w3.org/2000/svg" width="160" height="160" viewBox="0 0 160 160" role="img" aria-labelledby="title desc">
  <title id="title">Braille Loader mark</title>
  <desc id="desc">A rounded square logo mark with braille dots forming a loading path.</desc>
  <defs>
    <linearGradient id="accent" x1="44" y1="126" x2="124" y2="36" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#14b8a6" />
      <stop offset="1" stop-color="#84cc16" />
    </linearGradient>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#020617" flood-opacity="0.16" />
    </filter>
    <style>
      .shell { fill: #0b0f14; }
      .dot { fill: #f8fafc; }
      .quiet { fill: #64748b; opacity: 0.34; }
      .accent { fill: url(#accent); }
      .path { stroke: url(#accent); }
      @media (prefers-color-scheme: dark) {
        .shell { fill: #f8fafc; }
        .dot { fill: #0b0f14; }
        .quiet { fill: #64748b; opacity: 0.42; }
      }
    </style>
  </defs>

  <rect class="shell" x="12" y="12" width="136" height="136" rx="34" filter="url(#soft-shadow)" />
  <path class="path" d="M42 113C54 127 78 131 98 120C120 108 128 83 116 63C105 45 82 38 62 47" fill="none" stroke-width="8" stroke-linecap="round" />

  <g transform="translate(43 37)">
    <circle class="quiet" cx="0" cy="0" r="8" />
    <circle class="dot" cx="37" cy="0" r="8" />
    <circle class="quiet" cx="74" cy="0" r="8" />

    <circle class="dot" cx="0" cy="30" r="8" />
    <circle class="quiet" cx="37" cy="30" r="8" />
    <circle class="accent" cx="74" cy="30" r="10" />

    <circle class="quiet" cx="0" cy="60" r="8" />
    <circle class="dot" cx="37" cy="60" r="8" />
    <circle class="quiet" cx="74" cy="60" r="8" />

    <circle class="accent" cx="0" cy="90" r="10" />
    <circle class="dot" cx="37" cy="90" r="8" />
    <circle class="dot" cx="74" cy="90" r="8" />
  </g>
</svg>
